name: ecommerce_app
description: "All-in-One Student Utility Super App"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  firebase_core: ^4.6.0
  firebase_auth: ^6.3.0
  cloud_firestore: ^6.2.0
  intl: ^0.19.0
  nepali_date_picker: ^6.0.0
  provider: ^6.1.2
  shared_preferences: ^2.3.4
  fl_chart: ^0.69.0
  qr_flutter: ^4.1.0
  uuid: ^4.5.1
  pdf: ^3.11.1
  image_picker: ^1.1.2
  share_plus: ^10.1.4
  path_provider: ^2.1.5
  mobile_scanner: ^6.0.0
  flutter_local_notifications: ^18.0.0
  timezone: ^0.10.0
  geolocator: ^13.0.0
  http: ^1.2.0
  file_picker: ^8.3.0
  printing: ^5.13.2
  nepali_utils: ^3.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true

  assets:
    - assets/images/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/profile.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/images/profile.png"
