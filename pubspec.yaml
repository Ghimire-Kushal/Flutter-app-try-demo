name: ecommerce_app
description: "A new Flutter project"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  firebase_core: ^4.6.0
  firebase_auth: ^6.3.0
  intl: ^0.19.0
  nepali_date_picker: ^6.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3
  shared_preferences: ^2.2.2

flutter:
  uses-material-design: true

  assets:
    - assets/images/
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/profile.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/images/profile.png"
 